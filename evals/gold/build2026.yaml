# Gold dataset for Microsoft Build 2026 chatbot eval harness.
# Every case is grounded in real session data (verified against data/sessions.json).
#
# Schema lives in evals/schema.py (GoldCase).
# Add a case any time you observe a real user query that *should* behave a
# specific way. Tag cases so you can run subsets (--tag speaker-precision).

# ============================================================
# Layer 1 — Speaker-precision cases (THE original problem)
# ============================================================

- case_id: naomi-prompt-caching
  description: "Speaker filter must pin to Naomi's only session (BRK230)."
  query: "What did Naomi say about prompt caching?"
  query_variants:
    - "What did Naomi Moneypenny mention about prompt caching?"
    - "Did Naomi talk about prompt cache at Build 2026?"
  expected_behavior: answerable
  expected_speaker: "Naomi Moneypenny"
  speaker_session_purity_required: true
  speaker_evidence_purity_required: true
  gold_session_codes: ["BRK230"]
  forbidden_session_codes: ["BRK226", "OD823", "ODSP928"]  # all relate to caching but no Naomi
  required_citations: ["BRK230"]
  forbidden_citations: ["BRK226", "OD823", "ODSP928"]
  must_contain_all: ["BRK230", "Naomi", "prompt caching"]
  must_not_contain_any: ["[BRK226]", "[OD823]"]
  tags: [speaker-precision, p0]

- case_id: mark-context-cache-honest-refusal
  description: "BRK226 AI summary attributes Context Cache to 'Marcus', not Mark Russinovich. Model must refuse honestly."
  query: "What did Mark Russinovich say about Azure Context Cache?"
  expected_behavior: honest_refusal
  expected_speaker: "Mark Russinovich"
  allowed_speaker_aliases: ["Russinovich", "Mark"]
  speaker_session_purity_required: true
  # We DO retrieve BRK226 — but the answer must not falsely attribute claims.
  gold_session_codes: ["BRK226"]
  must_contain_all: ["Mark"]
  # These would be hallucinated attributions:
  must_not_contain_any:
    - "Mark Russinovich explicitly said"
    - "Mark Russinovich explained that"
    - "Mark Russinovich announced"
    - "Russinovich stated"
  judge_context_note: "BRK226's AI summary attributes Context Cache to 'Marcus' — a refusal that explains this discrepancy is the correct answer."
  tags: [speaker-precision, honest-refusal, p0]

- case_id: satya-keynote
  description: "Satya should map to KEY01 keynote."
  query: "What did Satya Nadella say in his Build keynote?"
  query_variants:
    - "What were Satya's main points at Build?"
  expected_behavior: answerable
  expected_speaker: "Satya Nadella"
  speaker_session_purity_required: true
  speaker_evidence_purity_required: true
  gold_session_codes: ["KEY01"]
  must_contain_all: ["KEY01", "Satya"]
  tags: [speaker-precision, p0]

- case_id: russinovich-no-name-conflict
  description: "Last-name-only query for Russinovich should still pin to Mark's sessions."
  query: "Show me Russinovich's Build sessions"
  expected_behavior: answerable
  expected_speaker: "Mark Russinovich"
  allowed_speaker_aliases: ["Russinovich"]
  speaker_session_purity_required: true
  # Mark appears in 4 sessions; recall@5 should catch >= 1
  gold_session_codes: ["BRK226", "BRK227", "BRK247", "LIVE101"]
  must_contain_all: ["Russinovich"]
  tags: [speaker-precision, last-name]

- case_id: scott-hanselman-first-name-ambiguity
  description: "Bare 'Scott' should match Scott Hanselman OR refuse; must NOT silently merge with another Scott."
  query: "What did Scott present at Build 2026?"
  expected_behavior: partially_answerable
  expected_speaker: "Scott Hanselman"
  allowed_speaker_aliases: ["Scott"]
  speaker_session_purity_required: true
  # Recall any Scott-Hanselman session is fine
  gold_session_codes: ["BRK247", "LIVE101", "LIVE113", "LIVE144"]
  recall_at_k: 8
  tags: [speaker-precision, first-name-ambiguity]

# ============================================================
# Layer 2 — Out-of-scope / refusal cases
# ============================================================

- case_id: out-of-scope-coldfusion
  description: "Topic not in Build 2026 — must refuse, not hallucinate."
  query: "Tell me about Adobe ColdFusion sessions in Microsoft Build 2026"
  expected_behavior: out_of_scope_refusal
  must_contain_all: ["Build 2026"]
  must_not_contain_any: ["ColdFusion is", "ColdFusion was announced"]
  skip_judge: true
  tags: [out-of-scope, p0]

- case_id: out-of-scope-fake-speaker
  description: "Steve Jobs does not speak at Build. Must refuse, not silently map to someone."
  query: "What did Steve Jobs say at Build 2026?"
  expected_behavior: out_of_scope_refusal
  must_not_contain_any: ["Steve Jobs explained", "Steve Jobs announced"]
  skip_judge: true
  tags: [out-of-scope]

- case_id: out-of-scope-weather
  description: "Trivially off-topic must refuse."
  query: "What's the weather in San Francisco during Build?"
  expected_behavior: out_of_scope_refusal
  # NB: a correct refusal often says "check a weather forecast" — that
  # phrase is itself proof the agent declined to answer. We only forbid
  # affirmative weather claims.
  must_not_contain_any: ["sunny", "raining today", "tomorrow's weather"]
  skip_judge: true
  tags: [out-of-scope]

- case_id: fake-session-code
  description: "BRK999 doesn't exist. Must not invent details."
  query: "Tell me about session BRK999"
  expected_behavior: out_of_scope_refusal
  # Refusal must SAY 'BRK999' (to clarify the user's request), but must
  # NOT hallucinate any details about the non-existent session.
  must_not_contain_any:
    - "BRK999 covers"
    - "BRK999 includes"
    - "BRK999 discusses"
    - "BRK999 talks about"
    - "BRK999 features"
    - "BRK999 explores"
    - "session BRK999 is about"
    - "Speakers: "
  skip_judge: true
  tags: [out-of-scope, citation-laundering]

# ============================================================
# Layer 3 — Citation-laundering trap (model must NOT cite plausible-but-wrong sessions)
# ============================================================

- case_id: naomi-explicit-prompt-cache-strict
  description: "Even on the right session, answer must not also cite Mark's BRK226 as if Naomi spoke there."
  query: "When does Naomi Moneypenny introduce explicit prompt caching, and what timestamp?"
  expected_behavior: answerable
  expected_speaker: "Naomi Moneypenny"
  speaker_session_purity_required: true
  speaker_evidence_purity_required: true
  gold_session_codes: ["BRK230"]
  forbidden_session_codes: ["BRK226"]
  required_citations: ["BRK230"]
  forbidden_citations: ["BRK226"]
  must_contain_all: ["BRK230", "00:32"]
  tags: [speaker-precision, citation-laundering, timestamp, p0]

