- case_id: typo-tolerance
  description: "Common typo for 'prompt caching' should still recall BRK230 et al."
  query: "What is promt cacheing in Build 2026?"
  expected_behavior: partially_answerable
  gold_session_codes: ["BRK230", "OD823"]
  recall_at_k: 8
  tags: [robustness]
