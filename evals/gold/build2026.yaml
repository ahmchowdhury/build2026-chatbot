# ============================================================
# Layer 5 — Generic / topic queries (no speaker filter)
# ============================================================

- case_id: generic-prompt-caching
  description: "Without a speaker, broad retrieval is correct."
  query: "What is prompt caching in Azure AI?"
  expected_behavior: partially_answerable
  # At least one of the caching sessions should be retrieved
  gold_session_codes: ["BRK230", "BRK226", "OD823", "ODSP928"]
  recall_at_k: 8
  must_contain_all: ["caching"]
  tags: [generic, recall]

- case_id: agents-overview
  description: "Agents are a major Build 2026 theme — must return multiple sessions."
  query: "What's new with agents at Build 2026?"
  expected_behavior: partially_answerable
  gold_session_codes: []  # broad — no single gold session
  must_contain_all: ["agent"]
  tags: [generic, recall]

- case_id: foundry-overview
  description: "AI Foundry top-level question."
  query: "What's the latest with Azure AI Foundry?"
  expected_behavior: partially_answerable
  must_contain_all: ["Foundry"]
  # Synthesis-heavy queries take longer — Foundry has many sessions to summarize
  max_latency_ms: 22000
  tags: [generic]

# ============================================================
# Layer 6 — Topic summaries
# ============================================================

- case_id: summarize-windows
  description: "Topic summary should list multiple Windows sessions."
  query: "Summarize all Windows sessions"
  expected_behavior: topic_summary
  expected_topic: "Windows"
  min_sessions_returned: 5
  must_contain_all: ["Windows"]
  # Template response (rendered server-side from the catalog). Groundedness
  # judging is fundamentally inappropriate here — the answer isn't a
  # synthesis from passages; it's a structured listing.
  skip_judge: true
  tags: [topic-summary]

- case_id: summarize-foundry
  description: "Topic summary for AI Foundry."
  query: "Summarize all AI Foundry sessions"
  expected_behavior: topic_summary
  expected_topic: "AI Foundry"
  min_sessions_returned: 5
  must_contain_all: ["Foundry"]
  skip_judge: true
  tags: [topic-summary]

- case_id: list-topics
  description: "User asks what topics the bot knows."
  query: "topics"
  expected_behavior: clarification_needed  # "help/topics" is hint/help/topics kind
  must_contain_all: ["Foundry", "Windows"]
  skip_judge: true
  tags: [meta]

